<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄罗斯方块</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
  overflow-x: hidden;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.game-wrap {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.side {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 100px;
}
.panel {
  background: #16213e;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.panel .label {
  font-size: 0.7rem;
  text-transform: uppercase;
  color: #888;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.panel .value {
  font-size: 1.3rem;
  font-weight: 700;
}
#nextCanvas {
  display: block;
  margin: 6px auto 0;
}
canvas { border-radius: 6px; }
#board {
  display: block;
  background: #0d1b36;
  border-radius: 10px;
}
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
  width: 100%;
}
.btn:hover { background: #c73652; }
.btn.secondary { background: #16213e; }
.btn.secondary:hover { background: #0f3460; }
.controls-mobile {
  display: none;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
}
.ctrl-btn {
  width: 52px; height: 52px;
  border: none; border-radius: 10px;
  background: #16213e;
  color: #eee;
  font-size: 1.4rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { background: #0f3460; }
.footer {
  margin-top: 16px;
  font-size: 0.85rem;
}
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(13, 27, 54, 0.88);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border-radius: 10px;
  z-index: 5;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 1.6rem; color: #e94560; }
.overlay .btn { width: 140px; }
.board-wrap { position: relative; }
@media (max-width: 500px) {
  .controls-mobile { display: flex; }
  .side { min-width: 80px; }
  .panel { padding: 8px; }
  .panel .value { font-size: 1.1rem; }
}
</style>
</head>
<body>

<h1>俄罗斯方块</h1>

<div class="game-wrap">
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlayMsg">游戏结束</h2>
      <button class="btn" onclick="startGame()">再来一局</button>
    </div>
  </div>
  <div class="side">
    <div class="panel">
      <div class="label">分数</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <div class="label">行数</div>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel">
      <div class="label">等级</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel">
      <div class="label">下一个</div>
      <canvas id="nextCanvas"></canvas>
    </div>
    <button class="btn" onclick="startGame()">新游戏</button>
    <button class="btn secondary" id="pauseBtn" onclick="togglePause()">暂停</button>
  </div>
</div>

<div class="controls-mobile" id="mobileCtrl">
  <button class="ctrl-btn" ontouchstart="mobileAction('left',event)">◀</button>
  <button class="ctrl-btn" ontouchstart="mobileAction('down',event)">▼</button>
  <button class="ctrl-btn" ontouchstart="mobileAction('rotate',event)">↻</button>
  <button class="ctrl-btn" ontouchstart="mobileAction('right',event)">▶</button>
  <button class="ctrl-btn" ontouchstart="mobileAction('drop',event)">⏬</button>
</div>

<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
// ===== Constants =====
const COLS = 10, ROWS = 20;
const SHAPES = {
  I: { blocks: [[0,0],[0,1],[0,2],[0,3]], color: '#00d2d3' },
  O: { blocks: [[0,0],[0,1],[1,0],[1,1]], color: '#feca57' },
  T: { blocks: [[0,0],[0,1],[0,2],[1,1]], color: '#a855f7' },
  S: { blocks: [[0,1],[0,2],[1,0],[1,1]], color: '#10b981' },
  Z: { blocks: [[0,0],[0,1],[1,1],[1,2]], color: '#ef4444' },
  J: { blocks: [[0,0],[1,0],[1,1],[1,2]], color: '#3b82f6' },
  L: { blocks: [[0,2],[1,0],[1,1],[1,2]], color: '#f97316' }
};
const SHAPE_KEYS = Object.keys(SHAPES);
const LINE_SCORES = [0, 100, 300, 500, 800];

const boardCanvas = document.getElementById('board');
const boardCtx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');

let cellSize, grid, current, next, score, lines, level, paused, over, timer, dropInterval;

// ===== Sizing =====
function resize() {
  const maxH = window.innerHeight - 160;
  const maxW = (window.innerWidth - 160) * 0.65;
  cellSize = Math.floor(Math.min(maxH / ROWS, maxW / COLS));
  cellSize = Math.max(cellSize, 18);
  cellSize = Math.min(cellSize, 32);
  boardCanvas.width = COLS * cellSize;
  boardCanvas.height = ROWS * cellSize;
  const nc = cellSize * 0.75;
  nextCanvas.width = nc * 4 + 4;
  nextCanvas.height = nc * 4 + 4;
  drawBoard();
  drawNext();
}

// ===== Piece =====
function randomKey() { return SHAPE_KEYS[Math.floor(Math.random() * SHAPE_KEYS.length)]; }

function newPiece(key) {
  const s = SHAPES[key];
  const blocks = s.blocks.map(b => [...b]);
  // center horizontally
  const minC = Math.min(...blocks.map(b => b[1]));
  const maxC = Math.max(...blocks.map(b => b[1]));
  const off = Math.floor((COLS - (maxC - minC + 1)) / 2) - minC;
  return { blocks: blocks.map(([r,c]) => [r, c + off]), color: s.color, key };
}

function valid(blocks) {
  return blocks.every(([r,c]) => r >= 0 && r < ROWS && c >= 0 && c < COLS && !grid[r][c]);
}

function rotate(piece) {
  // Rotate around center of bounding box
  const rs = piece.blocks.map(b => b[0]), cs = piece.blocks.map(b => b[1]);
  const cr = Math.round((Math.min(...rs) + Math.max(...rs)) / 2);
  const cc = Math.round((Math.min(...cs) + Math.max(...cs)) / 2);
  const newBlocks = piece.blocks.map(([r,c]) => [cr + (c - cc), cc - (r - cr)]);
  // Wall kicks: try offsets
  for (const [dr, dc] of [[0,0],[0,-1],[0,1],[0,-2],[0,2],[-1,0],[1,0]]) {
    const shifted = newBlocks.map(([r,c]) => [r+dr, c+dc]);
    if (valid(shifted)) return { ...piece, blocks: shifted };
  }
  return null;
}

// ===== Game loop =====
function startGame() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  score = 0; lines = 0; level = 1; paused = false; over = false;
  dropInterval = 800;
  next = randomKey();
  spawnPiece();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('pauseBtn').textContent = '暂停';
  updateUI();
  clearInterval(timer);
  timer = setInterval(tick, dropInterval);
}

function spawnPiece() {
  current = newPiece(next);
  next = randomKey();
  drawNext();
  if (!valid(current.blocks)) {
    // Game over
    lock();
    over = true;
    clearInterval(timer);
    document.getElementById('overlayMsg').textContent = '游戏结束';
    document.getElementById('overlay').classList.add('show');
  }
}

function tick() {
  if (paused || over) return;
  moveDown();
}

function moveDown() {
  const nb = current.blocks.map(([r,c]) => [r+1, c]);
  if (valid(nb)) {
    current.blocks = nb;
  } else {
    lock();
    clearLines();
    spawnPiece();
  }
  drawBoard();
}

function lock() {
  for (const [r,c] of current.blocks) {
    if (r >= 0 && r < ROWS) grid[r][c] = current.color;
  }
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      r++; // re-check
    }
  }
  if (cleared) {
    lines += cleared;
    score += LINE_SCORES[cleared] * level;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 800 - (level - 1) * 70);
    clearInterval(timer);
    timer = setInterval(tick, dropInterval);
    updateUI();
  }
}

function hardDrop() {
  while (true) {
    const nb = current.blocks.map(([r,c]) => [r+1, c]);
    if (!valid(nb)) break;
    current.blocks = nb;
    score += 2;
  }
  lock();
  clearLines();
  spawnPiece();
  drawBoard();
  updateUI();
}

function togglePause() {
  if (over) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
  if (paused) {
    document.getElementById('overlayMsg').textContent = '暂停中';
    document.getElementById('overlay').classList.add('show');
  } else {
    document.getElementById('overlay').classList.remove('show');
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
}

// ===== Drawing =====
function drawCell(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(x + 1, y + 1, size - 2, 3);
  ctx.fillRect(x + 1, y + 1, 3, size - 2);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(x + size - 3, y + 1, 2, size - 2);
  ctx.fillRect(x + 1, y + size - 3, size - 2, 2);
}

function drawBoard() {
  const w = boardCanvas.width, h = boardCanvas.height;
  ctx = boardCtx;
  ctx.fillStyle = '#0d1b36';
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = 'rgba(42,74,127,0.3)';
  ctx.lineWidth = 0.5;
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * cellSize, 0); ctx.lineTo(c * cellSize, h); ctx.stroke();
  }
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * cellSize); ctx.lineTo(w, r * cellSize); ctx.stroke();
  }

  // Locked cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) drawCell(ctx, c * cellSize, r * cellSize, cellSize, grid[r][c]);
    }
  }

  if (over || !current) return;

  // Ghost piece
  let ghostBlocks = current.blocks.map(b => [...b]);
  while (true) {
    const nb = ghostBlocks.map(([r,c]) => [r+1, c]);
    const ok = nb.every(([r,c]) => r >= 0 && r < ROWS && c >= 0 && c < COLS && !grid[r][c]);
    if (!ok) break;
    ghostBlocks = nb;
  }
  for (const [r,c] of ghostBlocks) {
    if (r >= 0) {
      ctx.strokeStyle = current.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.3;
      ctx.strokeRect(c * cellSize + 2, r * cellSize + 2, cellSize - 4, cellSize - 4);
      ctx.globalAlpha = 1;
    }
  }

  // Current piece
  for (const [r,c] of current.blocks) {
    if (r >= 0) drawCell(ctx, c * cellSize, r * cellSize, cellSize, current.color);
  }
}

function drawNext() {
  const nc = nextCanvas.width;
  const c = nextCtx;
  c.fillStyle = '#16213e';
  c.fillRect(0, 0, nc, nc);
  if (!next) return;
  const s = SHAPES[next];
  const sz = nc / 5;
  const rs = s.blocks.map(b => b[0]), cs = s.blocks.map(b => b[1]);
  const h = Math.max(...rs) - Math.min(...rs) + 1;
  const w = Math.max(...cs) - Math.min(...cs) + 1;
  const offX = (nc - w * sz) / 2 - Math.min(...cs) * sz;
  const offY = (nc - h * sz) / 2 - Math.min(...rs) * sz;
  for (const [br, bc] of s.blocks) {
    drawCell(c, offX + bc * sz, offY + br * sz, sz, s.color);
  }
}

// ===== Input =====
document.addEventListener('keydown', e => {
  if (over) return;
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  if (paused) return;
  switch (e.key) {
    case 'ArrowLeft': {
      const nb = current.blocks.map(([r,c]) => [r, c-1]);
      if (valid(nb)) current.blocks = nb;
      break;
    }
    case 'ArrowRight': {
      const nb = current.blocks.map(([r,c]) => [r, c+1]);
      if (valid(nb)) current.blocks = nb;
      break;
    }
    case 'ArrowDown':
      moveDown();
      score += 1;
      updateUI();
      break;
    case 'ArrowUp': {
      const rotated = rotate(current);
      if (rotated) current = rotated;
      break;
    }
    case ' ':
      hardDrop();
      break;
    default: return;
  }
  e.preventDefault();
  drawBoard();
});

// Mobile
function mobileAction(action, e) {
  if (e) e.preventDefault();
  if (over || paused) return;
  switch (action) {
    case 'left': {
      const nb = current.blocks.map(([r,c]) => [r, c-1]);
      if (valid(nb)) current.blocks = nb;
      break;
    }
    case 'right': {
      const nb = current.blocks.map(([r,c]) => [r, c+1]);
      if (valid(nb)) current.blocks = nb;
      break;
    }
    case 'down':
      moveDown();
      score += 1;
      updateUI();
      break;
    case 'rotate': {
      const rotated = rotate(current);
      if (rotated) current = rotated;
      break;
    }
    case 'drop':
      hardDrop();
      break;
  }
  drawBoard();
}

// Touch swipe on board
let tx, ty;
boardCanvas.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });
boardCanvas.addEventListener('touchend', e => {
  if (over || paused) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) < 20) {
    // Tap = rotate
    const rotated = rotate(current);
    if (rotated) current = rotated;
  } else if (ax > ay) {
    const nb = current.blocks.map(([r,c]) => [r, c + (dx > 0 ? 1 : -1)]);
    if (valid(nb)) current.blocks = nb;
  } else if (dy > 0) {
    if (ay > 80) hardDrop();
    else { moveDown(); score += 1; updateUI(); }
  }
  drawBoard();
});

window.addEventListener('resize', resize);
resize();
startGame();
</script>
</body>
</html>
