<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>宝石消消乐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
  touch-action: none;
  user-select: none;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.info { display: flex; gap: 14px; margin-bottom: 12px; }
.stat {
  background: #16213e; border-radius: 8px;
  padding: 6px 16px; text-align: center; min-width: 72px;
}
.stat .label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
.stat .value { font-size: 1.2rem; font-weight: 700; }
canvas { display: block; border-radius: 10px; cursor: pointer; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn {
  padding: 10px 28px; border: none; border-radius: 8px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  background: #e94560; color: #fff; transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.footer { margin-top: 16px; font-size: 0.85rem; }
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>宝石消消乐</h1>
<div class="info">
  <div class="stat"><div class="label">分数</div><div class="value" id="score">0</div></div>
  <div class="stat"><div class="label">连击</div><div class="value" id="combo">0</div></div>
  <div class="stat"><div class="label">最高</div><div class="value" id="best">0</div></div>
</div>
<canvas id="canvas"></canvas>
<div class="btn-row">
  <button class="btn" onclick="newGame()">新游戏</button>
</div>
<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const ROWS = 8, COLS = 8;
const TYPES = 6;
const COLORS = ['#ef4444','#f97316','#f0c929','#10b981','#3b82f6','#a855f7'];
const SHAPES = ['diamond','circle','square','triangle','star','hexagon'];

let cellSize, pad, boardPx;
let grid; // grid[r][c] = { type, x, y, targetY, removing, scale }
let score, combo, best, animating, selected, particles;

function resize() {
  const maxW = Math.min(window.innerWidth - 20, 480);
  const maxH = window.innerHeight - 200;
  boardPx = Math.min(maxW, maxH);
  boardPx = Math.max(boardPx, 280);
  canvas.width = canvas.height = boardPx;
  cellSize = boardPx / COLS;
  pad = cellSize * 0.12;
  draw();
}

// === Grid ===
function randomType() { return Math.floor(Math.random() * TYPES); }

function makeCell(r, c, type) {
  return { type, x: c * cellSize, y: r * cellSize, targetY: r * cellSize, removing: false, scale: 1 };
}

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      let t;
      do {
        t = randomType();
      } while (wouldMatch(r, c, t));
      grid[r][c] = makeCell(r, c, t);
    }
  }
}

function wouldMatch(r, c, type) {
  // Check left
  if (c >= 2 && grid[r][c-1] && grid[r][c-2] &&
      grid[r][c-1].type === type && grid[r][c-2].type === type) return true;
  // Check up
  if (r >= 2 && grid[r-1] && grid[r-2] &&
      grid[r-1][c] && grid[r-2][c] &&
      grid[r-1][c].type === type && grid[r-2][c].type === type) return true;
  return false;
}

function newGame() {
  score = 0; combo = 0; animating = false; selected = null; particles = [];
  best = parseInt(localStorage.getItem('bestMatch3') || '0');
  initGrid();
  updateUI();
  draw();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = combo;
  if (score > best) { best = score; localStorage.setItem('bestMatch3', best); }
  document.getElementById('best').textContent = best;
}

// === Match Detection ===
function findMatches() {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      if (!grid[r][c] || !grid[r][c+1] || !grid[r][c+2]) continue;
      const t = grid[r][c].type;
      if (grid[r][c+1].type === t && grid[r][c+2].type === t) {
        let end = c + 2;
        while (end + 1 < COLS && grid[r][end+1] && grid[r][end+1].type === t) end++;
        for (let i = c; i <= end; i++) matched.add(r * COLS + i);
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      if (!grid[r][c] || !grid[r+1][c] || !grid[r+2][c]) continue;
      const t = grid[r][c].type;
      if (grid[r+1][c].type === t && grid[r+2][c].type === t) {
        let end = r + 2;
        while (end + 1 < ROWS && grid[end+1][c] && grid[end+1][c].type === t) end++;
        for (let i = r; i <= end; i++) matched.add(i * COLS + c);
      }
    }
  }
  return matched;
}

// === Swap & Process ===
function swap(r1, c1, r2, c2) {
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;
}

function trySwap(r1, c1, r2, c2) {
  if (animating) return;
  swap(r1, c1, r2, c2);
  // Fix positions
  if (grid[r1][c1]) { grid[r1][c1].x = c1 * cellSize; grid[r1][c1].y = r1 * cellSize; grid[r1][c1].targetY = r1 * cellSize; }
  if (grid[r2][c2]) { grid[r2][c2].x = c2 * cellSize; grid[r2][c2].y = r2 * cellSize; grid[r2][c2].targetY = r2 * cellSize; }

  const matches = findMatches();
  if (matches.size === 0) {
    // Swap back
    swap(r1, c1, r2, c2);
    if (grid[r1][c1]) { grid[r1][c1].x = c1 * cellSize; grid[r1][c1].y = r1 * cellSize; grid[r1][c1].targetY = r1 * cellSize; }
    if (grid[r2][c2]) { grid[r2][c2].x = c2 * cellSize; grid[r2][c2].y = r2 * cellSize; grid[r2][c2].targetY = r2 * cellSize; }
    draw();
    return;
  }
  combo = 0;
  animating = true;
  processMatches();
}

function processMatches() {
  const matches = findMatches();
  if (matches.size === 0) {
    animating = false;
    if (!hasValidMove()) shuffleBoard();
    return;
  }

  combo++;
  const pts = matches.size * 10 * combo;
  score += pts;
  updateUI();

  // Mark for removal & particles
  for (const key of matches) {
    const r = Math.floor(key / COLS), c = key % COLS;
    if (grid[r][c]) {
      spawnParticles(grid[r][c].x + cellSize / 2, grid[r][c].y + cellSize / 2, COLORS[grid[r][c].type]);
      grid[r][c] = null;
    }
  }

  // Animate removal then drop
  setTimeout(() => {
    dropGems();
    setTimeout(() => {
      fillEmpty();
      setTimeout(() => processMatches(), 200);
    }, 250);
  }, 200);

  draw();
}

function dropGems() {
  for (let c = 0; c < COLS; c++) {
    let writeR = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c]) {
        grid[writeR][c] = grid[r][c];
        grid[writeR][c].targetY = writeR * cellSize;
        grid[writeR][c].x = c * cellSize;
        if (writeR !== r) grid[r][c] = null;
        writeR--;
      }
    }
    for (let r = writeR; r >= 0; r--) {
      grid[r][c] = null;
    }
  }
  animateDrop();
}

function fillEmpty() {
  for (let c = 0; c < COLS; c++) {
    let emptyCount = 0;
    for (let r = 0; r < ROWS; r++) {
      if (!grid[r][c]) emptyCount++;
    }
    let idx = 0;
    for (let r = 0; r < ROWS; r++) {
      if (!grid[r][c]) {
        const t = randomType();
        grid[r][c] = makeCell(r, c, t);
        grid[r][c].y = -(emptyCount - idx) * cellSize;
        grid[r][c].targetY = r * cellSize;
        idx++;
      }
    }
  }
  animateDrop();
}

function animateDrop() {
  let moving = false;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const g = grid[r][c];
      if (!g) continue;
      if (Math.abs(g.y - g.targetY) > 0.5) {
        g.y += (g.targetY - g.y) * 0.3;
        moving = true;
      } else {
        g.y = g.targetY;
      }
    }
  }
  draw();
  if (moving) requestAnimationFrame(animateDrop);
}

function hasValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS) {
        swap(r, c, r, c + 1);
        const m = findMatches();
        swap(r, c, r, c + 1);
        if (m.size > 0) return true;
      }
      if (r + 1 < ROWS) {
        swap(r, c, r + 1, c);
        const m = findMatches();
        swap(r, c, r + 1, c);
        if (m.size > 0) return true;
      }
    }
  }
  return false;
}

function shuffleBoard() {
  // Flatten, shuffle, refill
  const types = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) types.push(grid[r][c].type);
  for (let i = types.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [types[i], types[j]] = [types[j], types[i]];
  }
  let idx = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = makeCell(r, c, types[idx++]);
    }
  // If still no valid move or has existing matches, just reinit
  if (!hasValidMove() || findMatches().size > 0) initGrid();
  draw();
}

// === Particles ===
function spawnParticles(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, color, life: 1 });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// === Drawing ===
function drawGem(x, y, size, type) {
  const cx = x + size / 2, cy = y + size / 2;
  const r = size * 0.35;
  const color = COLORS[type];

  ctx.save();
  switch (SHAPES[type]) {
    case 'diamond': {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
      ctx.fill();
      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r * 0.3, cy - r * 0.2);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx - r * 0.3, cy - r * 0.2);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'circle': {
      const g = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.1, cx, cy, r);
      g.addColorStop(0, lighten(color, 0.3));
      g.addColorStop(1, color);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'square': {
      const s = r * 0.8;
      ctx.fillStyle = color;
      roundRect(cx - s, cy - s, s * 2, s * 2, 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(cx - s + 2, cy - s + 2, s * 2 - 4, s * 0.5);
      break;
    }
    case 'triangle': {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r * 0.95, cy + r * 0.7);
      ctx.lineTo(cx - r * 0.95, cy + r * 0.7);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r * 0.35, cy - r * 0.05);
      ctx.lineTo(cx - r * 0.35, cy - r * 0.05);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'star': {
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (i * 72 - 90) * Math.PI / 180;
        const a2 = ((i * 72 + 36) - 90) * Math.PI / 180;
        ctx.lineTo(cx + Math.cos(a1) * r, cy + Math.sin(a1) * r);
        ctx.lineTo(cx + Math.cos(a2) * r * 0.45, cy + Math.sin(a2) * r * 0.45);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.15, cy - r * 0.15, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'hexagon': {
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i * 60 - 30) * Math.PI / 180;
        ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i * 60 - 30) * Math.PI / 180;
        ctx.lineTo(cx + Math.cos(a) * r * 0.5, cy - r * 0.2 + Math.sin(a) * r * 0.3);
      }
      ctx.closePath();
      ctx.fill();
      break;
    }
  }
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#0d1b36';
  ctx.fillRect(0, 0, boardPx, boardPx);

  // Grid bg
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#12254a' : '#0f1f40';
      ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
    }
  }

  // Selected highlight
  if (selected) {
    ctx.fillStyle = 'rgba(233,69,96,0.25)';
    ctx.fillRect(selected.c * cellSize, selected.r * cellSize, cellSize, cellSize);
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.strokeRect(selected.c * cellSize + 1, selected.r * cellSize + 1, cellSize - 2, cellSize - 2);
  }

  // Gems
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const g = grid[r][c];
      if (!g) continue;
      drawGem(g.x, g.y, cellSize, g.type);
    }
  }

  // Particles
  updateParticles();
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (particles.length > 0) requestAnimationFrame(draw);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + (255 - r) * amt);
  g = Math.min(255, g + (255 - g) * amt);
  b = Math.min(255, b + (255 - b) * amt);
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

// === Input ===
function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
  const py = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
  const mx = (px - rect.left) * (boardPx / rect.width);
  const my = (py - rect.top) * (boardPx / rect.height);
  const c = Math.floor(mx / cellSize);
  const r = Math.floor(my / cellSize);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c };
}

let dragStart = null;

canvas.addEventListener('mousedown', e => {
  if (animating) return;
  dragStart = getCellFromEvent(e);
});

canvas.addEventListener('mouseup', e => {
  if (animating || !dragStart) return;
  const end = getCellFromEvent(e);
  handleInput(dragStart, end);
  dragStart = null;
});

canvas.addEventListener('touchstart', e => {
  if (animating) return;
  e.preventDefault();
  dragStart = getCellFromEvent(e);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (animating || !dragStart) return;
  e.preventDefault();
  const end = getCellFromEvent(e.changedTouches ? { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY } : e);
  handleInput(dragStart, end);
  dragStart = null;
}, { passive: false });

function handleInput(start, end) {
  if (!start || !end) return;

  // Same cell = select/deselect
  if (start.r === end.r && start.c === end.c) {
    if (selected && selected.r === start.r && selected.c === start.c) {
      selected = null;
    } else if (selected && isAdjacent(selected, start)) {
      trySwap(selected.r, selected.c, start.r, start.c);
      selected = null;
    } else {
      selected = start;
    }
    draw();
    return;
  }

  // Drag to adjacent
  const dr = end.r - start.r, dc = end.c - start.c;
  let targetR = start.r, targetC = start.c;
  if (Math.abs(dr) > Math.abs(dc)) {
    targetR += dr > 0 ? 1 : -1;
  } else {
    targetC += dc > 0 ? 1 : -1;
  }
  if (targetR >= 0 && targetR < ROWS && targetC >= 0 && targetC < COLS) {
    selected = null;
    trySwap(start.r, start.c, targetR, targetC);
  }
  draw();
}

function isAdjacent(a, b) {
  return (Math.abs(a.r - b.r) + Math.abs(a.c - b.c)) === 1;
}

window.addEventListener('resize', resize);
resize();
newGame();
</script>
</body>
</html>
