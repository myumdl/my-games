<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
  touch-action: none;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.info {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
}
.stat {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 16px;
  text-align: center;
  min-width: 72px;
}
.stat .label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
.stat .value { font-size: 1.2rem; font-weight: 700; }
.wrap { position: relative; }
canvas { display: block; border-radius: 10px; }
.overlay {
  position: absolute; inset: 0;
  background: rgba(13,27,54,0.88);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border-radius: 10px;
  z-index: 5;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 1.8rem; color: #e94560; }
.overlay p { font-size: 1rem; color: #bbb; }
.btn {
  padding: 10px 28px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.controls {
  display: none;
  margin-top: 14px;
  position: relative;
  width: 160px;
  height: 160px;
}
.ctrl-btn {
  position: absolute;
  width: 50px; height: 50px;
  border: none; border-radius: 10px;
  background: #16213e;
  color: #eee;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { background: #0f3460; }
.ctrl-up { top: 0; left: 55px; }
.ctrl-down { bottom: 0; left: 55px; }
.ctrl-left { top: 55px; left: 0; }
.ctrl-right { top: 55px; right: 0; }
.footer { margin-top: 16px; font-size: 0.85rem; }
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
@media (max-width: 500px) { .controls { display: block; } }
</style>
</head>
<body>

<h1>贪吃蛇</h1>
<div class="info">
  <div class="stat"><div class="label">分数</div><div class="value" id="score">0</div></div>
  <div class="stat"><div class="label">最高</div><div class="value" id="best">0</div></div>
  <div class="stat"><div class="label">长度</div><div class="value" id="len">3</div></div>
</div>

<div class="wrap">
  <canvas id="canvas"></canvas>
  <div class="overlay show" id="overlay">
    <h2 id="msg">贪吃蛇</h2>
    <p id="sub">点击开始 / 按任意方向键</p>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>
</div>

<div class="controls" id="mobileCtrl">
  <button class="ctrl-btn ctrl-up" ontouchstart="setDir(0,-1,event)">▲</button>
  <button class="ctrl-btn ctrl-down" ontouchstart="setDir(0,1,event)">▼</button>
  <button class="ctrl-btn ctrl-left" ontouchstart="setDir(-1,0,event)">◀</button>
  <button class="ctrl-btn ctrl-right" ontouchstart="setDir(1,0,event)">▶</button>
</div>

<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const GRID = 20;
let cols, rows, cellSize, boardW, boardH;

let snake, dir, nextDir, food, score, best, state, timer, speed;
// state: 'idle' | 'play' | 'over'

function resize() {
  const maxW = Math.min(window.innerWidth - 20, 440);
  const maxH = window.innerHeight - 240;
  const size = Math.min(maxW, maxH);
  cellSize = Math.floor(size / GRID);
  cellSize = Math.max(cellSize, 14);
  cellSize = Math.min(cellSize, 24);
  cols = GRID;
  rows = GRID;
  boardW = cols * cellSize;
  boardH = rows * cellSize;
  canvas.width = boardW;
  canvas.height = boardH;
  draw();
}

function init() {
  const mid = Math.floor(GRID / 2);
  snake = [{x: mid, y: mid}, {x: mid-1, y: mid}, {x: mid-2, y: mid}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = 130;
  best = parseInt(localStorage.getItem('bestSnake') || '0');
  spawnFood();
  updateUI();
}

function spawnFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  const empty = [];
  for (let x = 0; x < cols; x++)
    for (let y = 0; y < rows; y++)
      if (!occupied.has(x + ',' + y)) empty.push({x, y});
  food = empty[Math.floor(Math.random() * empty.length)];
}

function startGame() {
  init();
  state = 'play';
  document.getElementById('overlay').classList.remove('show');
  clearInterval(timer);
  timer = setInterval(tick, speed);
}

function tick() {
  if (state !== 'play') return;

  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
    gameOver();
    return;
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) { best = score; localStorage.setItem('bestSnake', best); }
    spawnFood();
    // Speed up slightly
    if (speed > 60) {
      speed -= 2;
      clearInterval(timer);
      timer = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function gameOver() {
  state = 'over';
  clearInterval(timer);
  document.getElementById('msg').textContent = '游戏结束';
  document.getElementById('sub').textContent = `得分: ${score}　最高: ${best}`;
  document.getElementById('startBtn').textContent = '再来一局';
  document.getElementById('overlay').classList.add('show');
  draw();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('len').textContent = snake.length;
}

// === Drawing ===
function draw() {
  const w = boardW, h = boardH;

  // Background
  ctx.fillStyle = '#0d1b36';
  ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(42,74,127,0.2)';
  ctx.lineWidth = 0.5;
  for (let x = 1; x < cols; x++) {
    ctx.beginPath(); ctx.moveTo(x * cellSize, 0); ctx.lineTo(x * cellSize, h); ctx.stroke();
  }
  for (let y = 1; y < rows; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * cellSize); ctx.lineTo(w, y * cellSize); ctx.stroke();
  }

  if (!snake) return;

  // Food - pulsing red circle
  if (food) {
    const fx = food.x * cellSize + cellSize / 2;
    const fy = food.y * cellSize + cellSize / 2;
    const pulse = 1 + Math.sin(Date.now() * 0.006) * 0.15;
    const r = cellSize * 0.38 * pulse;

    // Glow
    ctx.shadowColor = '#e94560';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(fx - r * 0.25, fy - r * 0.25, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }

  // Snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const x = s.x * cellSize;
    const y = s.y * cellSize;
    const pad = 1;

    if (i === 0) {
      // Head - brighter
      ctx.fillStyle = '#2ecc71';
      roundRect(ctx, x + pad, y + pad, cellSize - pad * 2, cellSize - pad * 2, 5);
      ctx.fill();

      // Eyes
      const eyeR = cellSize * 0.1;
      let ex1, ey1, ex2, ey2;
      const cx = x + cellSize / 2, cy = y + cellSize / 2;
      if (dir.x === 1) { ex1 = cx + 4; ey1 = cy - 4; ex2 = cx + 4; ey2 = cy + 4; }
      else if (dir.x === -1) { ex1 = cx - 4; ey1 = cy - 4; ex2 = cx - 4; ey2 = cy + 4; }
      else if (dir.y === -1) { ex1 = cx - 4; ey1 = cy - 4; ex2 = cx + 4; ey2 = cy - 4; }
      else { ex1 = cx - 4; ey1 = cy + 4; ex2 = cx + 4; ey2 = cy + 4; }
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
    } else {
      // Body - gradient from bright to dark
      const t = i / snake.length;
      const r = Math.round(30 + (16 - 30) * t);
      const g = Math.round(180 + (100 - 180) * t);
      const b = Math.round(80 + (60 - 80) * t);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      roundRect(ctx, x + pad, y + pad, cellSize - pad * 2, cellSize - pad * 2, 4);
      ctx.fill();
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Food animation
function animLoop() {
  if (state === 'play') draw();
  requestAnimationFrame(animLoop);
}

// === Input ===
function setDir(dx, dy, e) {
  if (e) e.preventDefault();
  if (state === 'idle' || state === 'over') { startGame(); return; }
  // Prevent 180° turn
  if (dir.x + dx === 0 && dir.y + dy === 0) return;
  nextDir = {x: dx, y: dy};
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0, -1], ArrowDown: [0, 1],
    ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0]
  };
  const d = map[e.key];
  if (!d) return;
  e.preventDefault();
  setDir(d[0], d[1]);
});

// Touch swipe on canvas
let tx, ty;
canvas.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) < 20) return;
  if (ax > ay) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
});

document.getElementById('startBtn').addEventListener('click', startGame);

window.addEventListener('resize', resize);
resize();
init();
state = 'idle';
best = parseInt(localStorage.getItem('bestSnake') || '0');
document.getElementById('best').textContent = best;
requestAnimationFrame(animLoop);
</script>
</body>
</html>
