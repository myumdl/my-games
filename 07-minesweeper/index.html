<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扫雷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.toolbar {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center;
}
.diff-btn {
  padding: 6px 16px; border: 2px solid #16213e; border-radius: 8px;
  background: #16213e; color: #ccc; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.diff-btn.active { border-color: #e94560; color: #e94560; }
.diff-btn:hover { border-color: #e94560; }
.info {
  display: flex; gap: 14px; margin-bottom: 12px; align-items: center;
}
.stat {
  background: #16213e; border-radius: 8px;
  padding: 6px 16px; text-align: center; min-width: 68px;
}
.stat .label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
.stat .value { font-size: 1.2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.face-btn {
  width: 42px; height: 42px; border: none; border-radius: 8px;
  background: #16213e; font-size: 1.5rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.face-btn:hover { background: #0f3460; }
.board-scroll {
  overflow: auto; max-width: calc(100vw - 16px);
  max-height: calc(100vh - 220px);
  border-radius: 10px;
}
.board {
  display: inline-grid; gap: 1px; padding: 4px;
  background: #0d1b36; border-radius: 10px;
  user-select: none; -webkit-user-select: none;
}
.cell {
  width: var(--cell); height: var(--cell);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: var(--font);
  border-radius: 3px; cursor: pointer;
  transition: background 0.1s;
}
.cell.hidden {
  background: #1e3a5f;
}
.cell.hidden:hover { background: #2a4f7a; }
.cell.revealed {
  background: #12254a; cursor: default;
}
.cell.mine-hit { background: #7f1d1d; }
.cell.flagged { background: #1e3a5f; }
.n1 { color: #3b82f6; } .n2 { color: #10b981; } .n3 { color: #ef4444; }
.n4 { color: #7c3aed; } .n5 { color: #b91c1c; } .n6 { color: #0891b2; }
.n7 { color: #111; } .n8 { color: #888; }
.footer { margin-top: 16px; font-size: 0.85rem; }
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.mobile-flag {
  display: none; margin-bottom: 10px; gap: 10px; align-items: center;
}
.flag-toggle {
  padding: 8px 18px; border: 2px solid #16213e; border-radius: 8px;
  background: #16213e; color: #ccc; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.flag-toggle.active { border-color: #f0c929; color: #f0c929; background: #2a2a1e; }
.hint { color: #666; font-size: 0.8rem; }
@media (pointer: coarse) { .mobile-flag { display: flex; } }
</style>
</head>
<body>

<h1>扫雷</h1>

<div class="toolbar">
  <button class="diff-btn active" data-d="easy">初级 9×9</button>
  <button class="diff-btn" data-d="medium">中级 16×16</button>
  <button class="diff-btn" data-d="hard">高级 16×30</button>
</div>

<div class="info">
  <div class="stat"><div class="label">剩余雷</div><div class="value" id="mineCount">10</div></div>
  <button class="face-btn" id="faceBtn" title="新游戏">😀</button>
  <div class="stat"><div class="label">时间</div><div class="value" id="timer">0</div></div>
</div>

<div class="mobile-flag">
  <button class="flag-toggle" id="flagToggle">🚩 插旗模式</button>
  <span class="hint">开启后点击 = 插旗</span>
</div>

<div class="board-scroll">
  <div class="board" id="board"></div>
</div>

<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const DIFFS = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 }
};

let diff = 'easy', rows, cols, totalMines;
let grid, revealed, flagged, mineMap;
let state, timerVal, timerID, firstClick, flagMode;

const boardEl = document.getElementById('board');
const faceBtn = document.getElementById('faceBtn');
const flagToggle = document.getElementById('flagToggle');

// === Init ===
function newGame() {
  const d = DIFFS[diff];
  rows = d.rows; cols = d.cols; totalMines = d.mines;
  grid = Array.from({length: rows}, () => Array(cols).fill(0));
  revealed = Array.from({length: rows}, () => Array(cols).fill(false));
  flagged = Array.from({length: rows}, () => Array(cols).fill(false));
  mineMap = Array.from({length: rows}, () => Array(cols).fill(false));
  state = 'play';
  firstClick = true;
  timerVal = 0;
  flagMode = false;
  clearInterval(timerID);
  document.getElementById('timer').textContent = '0';
  faceBtn.textContent = '😀';
  flagToggle.classList.remove('active');
  updateMineCount();
  buildBoard();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (mineMap[r][c]) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    mineMap[r][c] = true;
    placed++;
  }
  // Compute numbers
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (mineMap[r][c]) { grid[r][c] = -1; continue; }
      let count = 0;
      forNeighbors(r, c, (nr, nc) => { if (mineMap[nr][nc]) count++; });
      grid[r][c] = count;
    }
  }
}

function forNeighbors(r, c, fn) {
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) fn(nr, nc);
    }
}

// === Board DOM ===
function buildBoard() {
  const maxW = window.innerWidth - 24;
  const maxH = window.innerHeight - 260;
  let cs = Math.floor(Math.min(maxW / cols, maxH / rows));
  cs = Math.max(cs, 22);
  cs = Math.min(cs, 36);
  boardEl.style.setProperty('--cell', cs + 'px');
  boardEl.style.setProperty('--font', Math.round(cs * 0.48) + 'px');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;

  boardEl.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 'cell hidden';
      el.dataset.r = r;
      el.dataset.c = c;
      el.addEventListener('click', onCellClick);
      el.addEventListener('contextmenu', onCellRight);
      // Long press for flag on mobile
      let longTimer;
      el.addEventListener('touchstart', e => {
        longTimer = setTimeout(() => { toggleFlag(r, c); longTimer = null; }, 400);
      }, { passive: true });
      el.addEventListener('touchend', () => { if (longTimer) clearTimeout(longTimer); });
      el.addEventListener('touchmove', () => { if (longTimer) clearTimeout(longTimer); });
      boardEl.appendChild(el);
    }
  }
}

function getCell(r, c) {
  return boardEl.children[r * cols + c];
}

function renderCell(r, c) {
  const el = getCell(r, c);
  if (revealed[r][c]) {
    el.className = 'cell revealed';
    if (grid[r][c] === -1) {
      el.textContent = '💣';
    } else if (grid[r][c] > 0) {
      el.textContent = grid[r][c];
      el.classList.add('n' + grid[r][c]);
    } else {
      el.textContent = '';
    }
  } else if (flagged[r][c]) {
    el.className = 'cell hidden flagged';
    el.textContent = '🚩';
  } else {
    el.className = 'cell hidden';
    el.textContent = '';
  }
}

// === Actions ===
function onCellClick(e) {
  if (state !== 'play') return;
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (flagMode) { toggleFlag(r, c); return; }
  if (flagged[r][c]) return;

  if (revealed[r][c]) {
    // Chord: if number matches surrounding flags, reveal rest
    if (grid[r][c] > 0) chord(r, c);
    return;
  }

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }

  reveal(r, c);
}

function onCellRight(e) {
  e.preventDefault();
  if (state !== 'play') return;
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  toggleFlag(r, c);
}

function toggleFlag(r, c) {
  if (state !== 'play' || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  renderCell(r, c);
  updateMineCount();
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;
  renderCell(r, c);

  if (grid[r][c] === -1) {
    gameOver(r, c);
    return;
  }

  // Flood fill for 0s
  if (grid[r][c] === 0) {
    forNeighbors(r, c, (nr, nc) => reveal(nr, nc));
  }

  checkWin();
}

function chord(r, c) {
  let flagCount = 0;
  forNeighbors(r, c, (nr, nc) => { if (flagged[nr][nc]) flagCount++; });
  if (flagCount !== grid[r][c]) return;
  forNeighbors(r, c, (nr, nc) => {
    if (!flagged[nr][nc] && !revealed[nr][nc]) reveal(nr, nc);
  });
}

function gameOver(hitR, hitC) {
  state = 'over';
  clearInterval(timerID);
  faceBtn.textContent = '😵';
  getCell(hitR, hitC).classList.add('mine-hit');

  // Reveal all mines
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      if (mineMap[r][c] && !flagged[r][c]) {
        revealed[r][c] = true;
        renderCell(r, c);
      }
      // Wrong flags
      if (flagged[r][c] && !mineMap[r][c]) {
        const el = getCell(r, c);
        el.textContent = '❌';
        el.classList.add('revealed');
      }
    }
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) unrevealed++;
  if (unrevealed === totalMines) {
    state = 'win';
    clearInterval(timerID);
    faceBtn.textContent = '😎';
    // Flag remaining
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (!revealed[r][c]) { flagged[r][c] = true; renderCell(r, c); }
    updateMineCount();
  }
}

function updateMineCount() {
  let flags = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (flagged[r][c]) flags++;
  document.getElementById('mineCount').textContent = totalMines - flags;
}

function startTimer() {
  timerID = setInterval(() => {
    timerVal++;
    document.getElementById('timer').textContent = timerVal;
  }, 1000);
}

// === Difficulty buttons ===
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    diff = btn.dataset.d;
    newGame();
  });
});

faceBtn.addEventListener('click', newGame);

flagToggle.addEventListener('click', () => {
  flagMode = !flagMode;
  flagToggle.classList.toggle('active', flagMode);
});

window.addEventListener('resize', () => {
  if (state === 'play' || state === 'win' || state === 'over') {
    // Recalc cell size
    const maxW = window.innerWidth - 24;
    const maxH = window.innerHeight - 260;
    let cs = Math.floor(Math.min(maxW / cols, maxH / rows));
    cs = Math.max(cs, 22);
    cs = Math.min(cs, 36);
    boardEl.style.setProperty('--cell', cs + 'px');
    boardEl.style.setProperty('--font', Math.round(cs * 0.48) + 'px');
  }
});

newGame();
</script>
</body>
</html>
