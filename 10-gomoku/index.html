<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>五子棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 16px 0;
  touch-action: none;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.info {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 1rem;
  min-height: 32px;
}
.dot {
  display: inline-block;
  width: 14px; height: 14px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 4px;
  border: 1px solid #555;
}
.dot.black { background: #111; }
.dot.white { background: #eee; }
#status { font-weight: 600; }
canvas {
  display: block;
  border-radius: 8px;
  cursor: crosshair;
}
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}
.btn {
  padding: 10px 28px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.btn.secondary { background: #16213e; }
.btn.secondary:hover { background: #0f3460; }
.footer {
  margin-top: 18px;
  font-size: 0.85rem;
}
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>五子棋</h1>
<div class="info">
  <span><span class="dot black"></span>你(黑)</span>
  <span><span class="dot white"></span>AI(白)</span>
  <span id="status">你的回合</span>
</div>
<canvas id="canvas"></canvas>
<div class="btn-row">
  <button class="btn" onclick="newGame()">新游戏</button>
  <button class="btn secondary" id="undoBtn" onclick="undo()">悔棋</button>
</div>
<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const N = 15;
const EMPTY = 0, BLACK = 1, WHITE = 2;
let board, history, gameOver, playerTurn;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cellSize, pad, boardPx;

function resize() {
  const maxW = Math.min(window.innerWidth - 24, 560);
  const maxH = window.innerHeight - 220;
  boardPx = Math.min(maxW, maxH);
  boardPx = Math.max(boardPx, 280);
  canvas.width = canvas.height = boardPx;
  cellSize = boardPx / (N + 1);
  pad = cellSize;
  draw();
}

function newGame() {
  board = Array.from({length: N}, () => Array(N).fill(EMPTY));
  history = [];
  gameOver = false;
  playerTurn = true;
  document.getElementById('status').textContent = '你的回合';
  draw();
}

function draw() {
  const w = boardPx;
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, w, w);

  // Grid lines
  ctx.strokeStyle = '#2a4a7f';
  ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    const p = pad + i * cellSize;
    ctx.beginPath(); ctx.moveTo(pad, p); ctx.lineTo(pad + (N-1)*cellSize, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, pad); ctx.lineTo(p, pad + (N-1)*cellSize); ctx.stroke();
  }

  // Star points
  const stars = [3, 7, 11];
  ctx.fillStyle = '#2a4a7f';
  for (const r of stars) for (const c of stars) {
    ctx.beginPath();
    ctx.arc(pad + c * cellSize, pad + r * cellSize, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stones
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] === EMPTY) continue;
      const x = pad + c * cellSize, y = pad + r * cellSize;
      const radius = cellSize * 0.43;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.arc(x + 2, y + 2, radius, 0, Math.PI * 2);
      ctx.fill();

      if (board[r][c] === BLACK) {
        const g = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
        g.addColorStop(0, '#555');
        g.addColorStop(1, '#111');
        ctx.fillStyle = g;
      } else {
        const g = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
        g.addColorStop(0, '#fff');
        g.addColorStop(1, '#bbb');
        ctx.fillStyle = g;
      }
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Last move marker
  if (history.length > 0) {
    const [lr, lc] = history[history.length - 1];
    const x = pad + lc * cellSize, y = pad + lr * cellSize;
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Click / Tap
canvas.addEventListener('click', e => {
  if (gameOver || !playerTurn) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const c = Math.round((mx - pad) / cellSize);
  const r = Math.round((my - pad) / cellSize);
  if (r < 0 || r >= N || c < 0 || c >= N) return;
  if (board[r][c] !== EMPTY) return;
  place(r, c, BLACK);
  if (gameOver) return;
  playerTurn = false;
  document.getElementById('status').textContent = 'AI 思考中...';
  setTimeout(aiMove, 100);
});

function place(r, c, who) {
  board[r][c] = who;
  history.push([r, c, who]);
  draw();
  if (checkWin(r, c, who)) {
    gameOver = true;
    document.getElementById('status').textContent = who === BLACK ? '你赢了!' : 'AI 赢了!';
  } else if (history.length === N * N) {
    gameOver = true;
    document.getElementById('status').textContent = '平局!';
  }
}

function undo() {
  if (gameOver || history.length < 2 || !playerTurn) return;
  // Remove AI move and player move
  for (let i = 0; i < 2; i++) {
    const [r, c] = history.pop();
    board[r][c] = EMPTY;
  }
  draw();
}

function checkWin(r, c, who) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = -1; d <= 1; d += 2) {
      let nr = r + dr * d, nc = c + dc * d;
      while (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc] === who) {
        count++; nr += dr * d; nc += dc * d;
      }
    }
    if (count >= 5) return true;
  }
  return false;
}

// ============ AI ============

function aiMove() {
  const move = findBestMove();
  if (move) {
    place(move[0], move[1], WHITE);
  }
  if (!gameOver) {
    playerTurn = true;
    document.getElementById('status').textContent = '你的回合';
  }
}

function findBestMove() {
  // Score every empty cell, pick highest
  let bestScore = -Infinity, bestMoves = [];
  const candidates = getCandidates();

  for (const [r, c] of candidates) {
    const s = evaluateMove(r, c);
    if (s > bestScore) { bestScore = s; bestMoves = [[r, c]]; }
    else if (s === bestScore) bestMoves.push([r, c]);
  }
  if (bestMoves.length === 0) return [7, 7];
  return bestMoves[Math.floor(Math.random() * bestMoves.length)];
}

function getCandidates() {
  const set = new Set();
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] === EMPTY) continue;
      for (let dr = -2; dr <= 2; dr++) {
        for (let dc = -2; dc <= 2; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc] === EMPTY) {
            set.add(nr * N + nc);
          }
        }
      }
    }
  }
  if (set.size === 0) return [[7, 7]];
  return [...set].map(k => [Math.floor(k / N), k % N]);
}

// Pattern scoring for a single line from a position
function scoreLine(r, c, dr, dc, who) {
  const opp = who === BLACK ? WHITE : BLACK;
  let count = 0, open = 0;

  // Forward
  let nr = r + dr, nc = c + dc, fCount = 0;
  while (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc] === who) {
    fCount++; nr += dr; nc += dc;
  }
  const fOpen = (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc] === EMPTY) ? 1 : 0;

  // Backward
  nr = r - dr; nc = c - dc;
  let bCount = 0;
  while (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc] === who) {
    bCount++; nr -= dr; nc -= dc;
  }
  const bOpen = (nr >= 0 && nr < N && nc >= 0 && nc < N && board[nr][nc] === EMPTY) ? 1 : 0;

  count = fCount + bCount + 1; // +1 for the placed stone
  open = fOpen + bOpen;

  if (count >= 5) return 1000000;
  if (count === 4) {
    if (open === 2) return 50000;   // live four
    if (open === 1) return 8000;    // half four
  }
  if (count === 3) {
    if (open === 2) return 5000;    // live three
    if (open === 1) return 800;     // half three
  }
  if (count === 2) {
    if (open === 2) return 600;     // live two
    if (open === 1) return 100;     // half two
  }
  if (count === 1 && open === 2) return 50;
  return 0;
}

function evaluatePos(r, c, who) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  let total = 0;
  board[r][c] = who;
  for (const [dr, dc] of dirs) {
    total += scoreLine(r, c, dr, dc, who);
  }
  board[r][c] = EMPTY;
  return total;
}

function evaluateMove(r, c) {
  const attack = evaluatePos(r, c, WHITE);
  const defend = evaluatePos(r, c, BLACK);

  // Win immediately
  if (attack >= 1000000) return 10000000;
  // Must block opponent win
  if (defend >= 1000000) return 9000000;

  // Weigh attack slightly more than defense for aggressive play
  return attack * 1.1 + defend;
}

window.addEventListener('resize', resize);
resize();
newGame();
</script>
</body>
</html>
