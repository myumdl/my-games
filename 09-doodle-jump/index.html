<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>涂鸦跳跃</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
  overflow: hidden;
  touch-action: none;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.wrap { position: relative; }
canvas { display: block; border-radius: 10px; }
.hud {
  position: absolute; top: 12px; left: 16px; right: 16px;
  display: flex; justify-content: space-between;
  pointer-events: none; z-index: 2;
}
.hud-score {
  font-size: 1.6rem; font-weight: 800; color: #fff;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
.hud-best { font-size: 0.9rem; color: #f0c929; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.overlay {
  position: absolute; inset: 0;
  background: rgba(13,27,54,0.88);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; border-radius: 10px; z-index: 5;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 1.8rem; color: #e94560; }
.overlay p { font-size: 1rem; color: #bbb; }
.btn {
  padding: 10px 28px; border: none; border-radius: 8px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  background: #e94560; color: #fff; transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.footer { margin-top: 16px; font-size: 0.85rem; }
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>涂鸦跳跃</h1>
<div class="wrap">
  <div class="hud">
    <span class="hud-score" id="scoreHud">0</span>
    <span class="hud-best" id="bestHud">最高: 0</span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="overlay show" id="overlay">
    <h2 id="msg">涂鸦跳跃</h2>
    <p id="sub">左右键/触屏控制方向，踩平台往上跳</p>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>
</div>
<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, scale;
function resize() {
  const maxW = Math.min(window.innerWidth - 20, 400);
  const maxH = window.innerHeight - 140;
  W = Math.min(maxW, 400);
  H = Math.min(maxH, 640);
  W = Math.max(W, 260); H = Math.max(H, 400);
  canvas.width = W; canvas.height = H;
  scale = H / 640;
}
resize();

// === Constants ===
const GRAVITY = 0.38;
const JUMP_VEL = -11;
const PLAT_COUNT = 8;
const PLAT_W = 68;
const PLAT_H = 14;
const PLAYER_W = 32;
const PLAYER_H = 36;
const MOVE_SPEED = 5.5;

// === State ===
let player, platforms, particles;
let score, maxHeight, best, state, keys;
// state: 'idle' | 'play' | 'over'

function init() {
  score = 0; maxHeight = 0;
  best = parseInt(localStorage.getItem('bestDoodle') || '0');
  document.getElementById('bestHud').textContent = `最高: ${best}`;
  document.getElementById('scoreHud').textContent = '0';
  keys = {};
  particles = [];

  player = {
    x: W / 2 - PLAYER_W * scale / 2,
    y: H * 0.7,
    vy: JUMP_VEL * scale,
    facing: 1, // 1=right, -1=left
    width: PLAYER_W * scale,
    height: PLAYER_H * scale
  };

  platforms = [];
  // Starting platform under player
  platforms.push(makePlatform(player.x, player.y + player.height + 2, 'normal'));
  // Fill screen with platforms
  for (let i = 1; i < PLAT_COUNT; i++) {
    const py = player.y + player.height - i * (H / PLAT_COUNT);
    platforms.push(makePlatform(Math.random() * (W - PLAT_W * scale), py, randomType()));
  }
}

function makePlatform(x, y, type) {
  return {
    x, y,
    w: PLAT_W * scale,
    h: PLAT_H * scale,
    type, // 'normal', 'moving', 'fragile', 'spring'
    vx: type === 'moving' ? (1.5 + Math.random()) * scale * (Math.random() > 0.5 ? 1 : -1) : 0,
    broken: false
  };
}

function randomType() {
  const h = maxHeight;
  const r = Math.random();
  if (h > 5000 && r < 0.15) return 'fragile';
  if (h > 2000 && r < 0.25) return 'moving';
  if (r < 0.08) return 'spring';
  return 'normal';
}

// === Update ===
function update() {
  if (state !== 'play') return;

  // Player horizontal movement
  const ms = MOVE_SPEED * scale;
  if (keys.left) { player.x -= ms; player.facing = -1; }
  if (keys.right) { player.x += ms; player.facing = 1; }

  // Wrap around
  if (player.x + player.width < 0) player.x = W;
  if (player.x > W) player.x = -player.width;

  // Gravity
  player.vy += GRAVITY * scale;
  player.y += player.vy;

  // Moving platforms
  for (const p of platforms) {
    if (p.type === 'moving' && !p.broken) {
      p.x += p.vx;
      if (p.x < 0 || p.x + p.w > W) p.vx = -p.vx;
    }
  }

  // Collision with platforms (only when falling)
  if (player.vy > 0) {
    const px = player.x, pw = player.width;
    const py = player.y + player.height;
    for (const p of platforms) {
      if (p.broken) continue;
      if (px + pw > p.x + 4 && px < p.x + p.w - 4 &&
          py >= p.y && py <= p.y + p.h + player.vy + 2) {
        if (p.type === 'fragile') {
          p.broken = true;
          spawnBreakParticles(p);
          continue;
        }
        player.y = p.y - player.height;
        const jumpV = p.type === 'spring' ? JUMP_VEL * 1.6 * scale : JUMP_VEL * scale;
        player.vy = jumpV;
        if (p.type === 'spring') spawnSpringParticles(p);
      }
    }
  }

  // Scroll camera when player goes above mid screen
  const scrollLine = H * 0.38;
  if (player.y < scrollLine) {
    const shift = scrollLine - player.y;
    player.y = scrollLine;
    maxHeight += shift / scale;
    score = Math.floor(maxHeight);
    document.getElementById('scoreHud').textContent = score;

    for (const p of platforms) p.y += shift;
    for (const pt of particles) pt.y += shift;

    // Remove off-screen platforms and add new ones
    for (let i = platforms.length - 1; i >= 0; i--) {
      if (platforms[i].y > H + 50) platforms.splice(i, 1);
    }
    while (platforms.length < PLAT_COUNT) {
      const topY = Math.min(...platforms.map(p => p.y));
      const gap = H / PLAT_COUNT;
      const ny = topY - gap - Math.random() * gap * 0.4;
      platforms.push(makePlatform(Math.random() * (W - PLAT_W * scale), ny, randomType()));
    }
  }

  // Fall off screen
  if (player.y > H + 50) {
    gameOver();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function gameOver() {
  state = 'over';
  if (score > best) {
    best = score;
    localStorage.setItem('bestDoodle', best);
  }
  document.getElementById('bestHud').textContent = `最高: ${best}`;
  document.getElementById('msg').textContent = '游戏结束';
  document.getElementById('sub').textContent = `得分: ${score}　最高: ${best}`;
  document.getElementById('startBtn').textContent = '再来一局';
  document.getElementById('overlay').classList.add('show');
}

function spawnBreakParticles(p) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: p.x + Math.random() * p.w, y: p.y,
      vx: (Math.random() - 0.5) * 3, vy: Math.random() * 2,
      color: '#8b5e34', life: 1
    });
  }
}

function spawnSpringParticles(p) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: p.x + p.w / 2, y: p.y,
      vx: (Math.random() - 0.5) * 4, vy: -2 - Math.random() * 3,
      color: '#f0c929', life: 1
    });
  }
}

// === Draw ===
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a1628');
  g.addColorStop(1, '#16213e');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Faint grid lines
  ctx.strokeStyle = 'rgba(42,74,127,0.12)';
  ctx.lineWidth = 1;
  const gs = 40 * scale;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPlatform(p) {
  if (p.broken) return;
  const r = p.h / 2;

  if (p.type === 'normal') {
    const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    g.addColorStop(0, '#2ecc71');
    g.addColorStop(1, '#1b8a2e');
    ctx.fillStyle = g;
  } else if (p.type === 'moving') {
    const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    g.addColorStop(0, '#3b82f6');
    g.addColorStop(1, '#1d4ed8');
    ctx.fillStyle = g;
  } else if (p.type === 'fragile') {
    ctx.fillStyle = '#8b6914';
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = '#6b4f10';
    ctx.lineWidth = 1.5;
  } else if (p.type === 'spring') {
    const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    g.addColorStop(0, '#2ecc71');
    g.addColorStop(1, '#1b8a2e');
    ctx.fillStyle = g;
  }

  // Draw rounded rect
  ctx.beginPath();
  ctx.moveTo(p.x + r, p.y);
  ctx.lineTo(p.x + p.w - r, p.y);
  ctx.quadraticCurveTo(p.x + p.w, p.y, p.x + p.w, p.y + r);
  ctx.lineTo(p.x + p.w, p.y + p.h - r);
  ctx.quadraticCurveTo(p.x + p.w, p.y + p.h, p.x + p.w - r, p.y + p.h);
  ctx.lineTo(p.x + r, p.y + p.h);
  ctx.quadraticCurveTo(p.x, p.y + p.h, p.x, p.y + p.h - r);
  ctx.lineTo(p.x, p.y + r);
  ctx.quadraticCurveTo(p.x, p.y, p.x + r, p.y);
  ctx.closePath();
  ctx.fill();
  if (p.type === 'fragile') { ctx.stroke(); ctx.setLineDash([]); }

  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(p.x + 4, p.y + 2, p.w - 8, 3);

  // Spring coil
  if (p.type === 'spring') {
    const sx = p.x + p.w / 2, sy = p.y;
    const coilH = 12 * scale;
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 3; i++) {
      const t = i / 3;
      const cx = sx + (i % 2 === 0 ? -6 : 6) * scale;
      ctx.lineTo(cx, sy - t * coilH);
    }
    ctx.stroke();
    // Spring top
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(sx, sy - coilH, 4 * scale, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer() {
  const p = player;
  const cx = p.x + p.width / 2;
  const cy = p.y + p.height / 2;

  ctx.save();
  ctx.translate(cx, cy);
  if (p.facing === -1) ctx.scale(-1, 1);

  const w2 = p.width / 2, h2 = p.height / 2;

  // Body
  ctx.fillStyle = '#f0c929';
  ctx.beginPath();
  ctx.ellipse(0, h2 * 0.1, w2 * 0.7, h2 * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#f5deb3';
  ctx.beginPath();
  ctx.ellipse(0, h2 * 0.25, w2 * 0.45, h2 * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(w2 * 0.25, -h2 * 0.2, w2 * 0.2, h2 * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(w2 * 0.32, -h2 * 0.18, w2 * 0.09, 0, Math.PI * 2);
  ctx.fill();

  // Nose/beak
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.moveTo(w2 * 0.55, -h2 * 0.05);
  ctx.lineTo(w2 * 0.9, h2 * 0.05);
  ctx.lineTo(w2 * 0.55, h2 * 0.15);
  ctx.closePath();
  ctx.fill();

  // Feet
  const legOff = player.vy > 0 ? 4 * scale : -2 * scale;
  ctx.fillStyle = '#c78c1e';
  ctx.beginPath();
  ctx.ellipse(-w2 * 0.3, h2 * 0.85 + legOff, w2 * 0.22, h2 * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w2 * 0.25, h2 * 0.85 + legOff, w2 * 0.22, h2 * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * scale, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  drawBg();
  for (const p of platforms) drawPlatform(p);
  if (state === 'play') drawPlayer();
  drawParticles();
}

// === Loop ===
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// === Input ===
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// Touch - tilt style: touch left half = go left, right half = go right
let touchActive = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchActive = true;
  handleTouch(e.touches[0]);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchActive) handleTouch(e.touches[0]);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  keys.left = false; keys.right = false;
}, { passive: false });

function handleTouch(touch) {
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const mid = rect.width / 2;
  keys.left = x < mid;
  keys.right = x >= mid;
}

// Also support device tilt
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', e => {
    if (state !== 'play') return;
    const gamma = e.gamma; // -90..90
    if (gamma === null) return;
    keys.left = gamma < -8;
    keys.right = gamma > 8;
  });
}

// Start button
document.getElementById('startBtn').addEventListener('click', () => {
  init();
  state = 'play';
  document.getElementById('overlay').classList.remove('show');
});

window.addEventListener('resize', resize);

init();
state = 'idle';
requestAnimationFrame(loop);
</script>
</body>
</html>
