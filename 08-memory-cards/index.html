<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>记忆翻牌</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
  user-select: none;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.toolbar {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center;
}
.diff-btn {
  padding: 6px 16px; border: 2px solid #16213e; border-radius: 8px;
  background: #16213e; color: #ccc; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.diff-btn.active { border-color: #e94560; color: #e94560; }
.diff-btn:hover { border-color: #e94560; }
.info { display: flex; gap: 14px; margin-bottom: 14px; }
.stat {
  background: #16213e; border-radius: 8px;
  padding: 6px 16px; text-align: center; min-width: 68px;
}
.stat .label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
.stat .value { font-size: 1.2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.grid {
  display: grid; gap: 8px;
  perspective: 800px;
}
.card {
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.4s ease;
}
.card.flipped { transform: rotateY(180deg); }
.card.matched { transform: rotateY(180deg); }
.card.matched .front { box-shadow: 0 0 12px rgba(16,185,129,0.5); border-color: #10b981; }
.card-face {
  position: absolute; inset: 0;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden;
}
.back {
  background: linear-gradient(135deg, #1e3a5f 0%, #0f3460 100%);
  border: 2px solid #2a4a7f;
}
.back-pattern {
  width: 60%; height: 60%;
  border: 2px solid #2a4a7f;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #2a4a7f; font-size: 1.2em; font-weight: 800;
}
.front {
  background: #12254a;
  border: 2px solid #1e3a5f;
  transform: rotateY(180deg);
}
.card:hover .back { border-color: #e94560; }
.overlay {
  position: fixed; inset: 0;
  background: rgba(26,26,46,0.9);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 10;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 2rem; color: #e94560; }
.overlay p { font-size: 1.1rem; color: #bbb; }
.btn {
  padding: 10px 28px; border: none; border-radius: 8px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  background: #e94560; color: #fff; transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.footer { margin-top: 16px; font-size: 0.85rem; }
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }

@keyframes matchPop {
  0% { transform: rotateY(180deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.1); }
  100% { transform: rotateY(180deg) scale(1); }
}
.card.match-anim { animation: matchPop 0.35s ease; }
</style>
</head>
<body>

<h1>记忆翻牌</h1>

<div class="toolbar">
  <button class="diff-btn active" data-d="easy">简单 4×3</button>
  <button class="diff-btn" data-d="medium">中等 4×4</button>
  <button class="diff-btn" data-d="hard">困难 6×4</button>
  <button class="diff-btn" data-d="expert">专家 6×5</button>
</div>

<div class="info">
  <div class="stat"><div class="label">步数</div><div class="value" id="moves">0</div></div>
  <div class="stat"><div class="label">配对</div><div class="value" id="pairs">0/6</div></div>
  <div class="stat"><div class="label">时间</div><div class="value" id="timer">0</div></div>
  <div class="stat"><div class="label">最佳</div><div class="value" id="best">-</div></div>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <h2>🎉 恭喜通关!</h2>
  <p id="result"></p>
  <button class="btn" onclick="newGame()">再来一局</button>
</div>

<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const DIFFS = {
  easy:   { cols: 4, rows: 3 },
  medium: { cols: 4, rows: 4 },
  hard:   { cols: 6, rows: 4 },
  expert: { cols: 6, rows: 5 }
};

const ALL_EMOJI = [
  '🍎','🍊','🍋','🍇','🍓','🍒','🍑','🥝','🍉','🍌','🫐','🥭',
  '🌸','🌻','🌺','🍀',
  '🐶','🐱','🐼','🐨','🦊','🐰','🐸','🦁','🐧','🐝',
  '🌈','⭐','🔥','💎','🎵','🎈'
];

let diff = 'easy', cols, rows, totalPairs;
let cards, flippedCards, matchedCount, moves, timerVal, timerID, locked, started;

const gridEl = document.getElementById('grid');

function newGame() {
  const d = DIFFS[diff];
  cols = d.cols; rows = d.rows;
  totalPairs = (cols * rows) / 2;
  moves = 0; matchedCount = 0; timerVal = 0;
  locked = false; started = false;
  flippedCards = [];
  clearInterval(timerID);
  document.getElementById('timer').textContent = '0';
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = `0/${totalPairs}`;
  document.getElementById('overlay').classList.remove('show');
  loadBest();

  // Pick random emoji pairs
  const shuffled = [...ALL_EMOJI].sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, totalPairs);
  const deck = [...picked, ...picked].sort(() => Math.random() - 0.5);
  cards = deck;

  buildGrid();
}

function buildGrid() {
  const maxW = Math.min(window.innerWidth - 24, 520);
  const maxH = window.innerHeight - 260;
  let cs = Math.floor(Math.min((maxW - (cols - 1) * 8) / cols, (maxH - (rows - 1) * 8) / rows));
  cs = Math.max(cs, 50);
  cs = Math.min(cs, 90);
  const fontSize = cs * 0.45;

  gridEl.style.gridTemplateColumns = `repeat(${cols}, ${cs}px)`;
  gridEl.innerHTML = '';

  for (let i = 0; i < cards.length; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.width = cs + 'px';
    card.style.height = cs + 'px';
    card.dataset.idx = i;

    const back = document.createElement('div');
    back.className = 'card-face back';
    const pat = document.createElement('div');
    pat.className = 'back-pattern';
    pat.textContent = '?';
    back.appendChild(pat);

    const front = document.createElement('div');
    front.className = 'card-face front';
    front.style.fontSize = fontSize + 'px';
    front.textContent = cards[i];

    card.appendChild(back);
    card.appendChild(front);
    card.addEventListener('click', () => onCardClick(i, card));
    gridEl.appendChild(card);
  }
}

function onCardClick(idx, el) {
  if (locked) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;

  if (!started) {
    started = true;
    timerID = setInterval(() => {
      timerVal++;
      document.getElementById('timer').textContent = timerVal;
    }, 1000);
  }

  el.classList.add('flipped');
  flippedCards.push({ idx, el });

  if (flippedCards.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    const [a, b] = flippedCards;

    if (cards[a.idx] === cards[b.idx]) {
      // Match
      locked = true;
      setTimeout(() => {
        a.el.classList.add('matched', 'match-anim');
        b.el.classList.add('matched', 'match-anim');
        matchedCount++;
        document.getElementById('pairs').textContent = `${matchedCount}/${totalPairs}`;
        flippedCards = [];
        locked = false;

        if (matchedCount === totalPairs) winGame();
      }, 300);
    } else {
      // No match - flip back
      locked = true;
      setTimeout(() => {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 800);
    }
  }
}

function winGame() {
  clearInterval(timerID);
  const key = `bestMemory_${diff}`;
  const prev = parseInt(localStorage.getItem(key) || '0');
  if (!prev || moves < prev) {
    localStorage.setItem(key, moves);
  }
  loadBest();

  document.getElementById('result').textContent =
    `用时 ${timerVal} 秒，共 ${moves} 步`;
  document.getElementById('overlay').classList.add('show');
}

function loadBest() {
  const key = `bestMemory_${diff}`;
  const val = localStorage.getItem(key);
  document.getElementById('best').textContent = val ? val + '步' : '-';
}

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    diff = btn.dataset.d;
    newGame();
  });
});

window.addEventListener('resize', () => {
  // Rebuild with current state
  const maxW = Math.min(window.innerWidth - 24, 520);
  const maxH = window.innerHeight - 260;
  let cs = Math.floor(Math.min((maxW - (cols - 1) * 8) / cols, (maxH - (rows - 1) * 8) / rows));
  cs = Math.max(cs, 50);
  cs = Math.min(cs, 90);
  gridEl.style.gridTemplateColumns = `repeat(${cols}, ${cs}px)`;
  gridEl.querySelectorAll('.card').forEach(c => {
    c.style.width = cs + 'px';
    c.style.height = cs + 'px';
    c.querySelector('.front').style.fontSize = cs * 0.45 + 'px';
  });
});

newGame();
</script>
</body>
</html>
