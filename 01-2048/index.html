<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
}
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
  width: min(90vw, 420px);
}
.header h1 {
  font-size: 2.4rem;
  font-weight: 800;
  color: #e94560;
  flex-shrink: 0;
}
.scores {
  display: flex;
  gap: 10px;
  margin-left: auto;
}
.score-box {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 14px;
  text-align: center;
  min-width: 70px;
}
.score-box .label {
  font-size: 0.65rem;
  text-transform: uppercase;
  color: #888;
  letter-spacing: 1px;
}
.score-box .value {
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
}
.board {
  position: relative;
  width: min(90vw, 420px);
  height: min(90vw, 420px);
  background: #16213e;
  border-radius: 12px;
  padding: 8px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 8px;
  width: 100%;
  height: 100%;
}
.cell {
  background: #0f3460;
  border-radius: 8px;
}
.tiles {
  position: absolute;
  inset: 8px;
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  border-radius: 8px;
  transition: top 0.12s ease, left 0.12s ease;
  z-index: 1;
}
.tile.new {
  animation: pop 0.2s ease;
}
.tile.merged {
  animation: pulse 0.2s ease;
  z-index: 2;
}
@keyframes pop {
  0% { transform: scale(0); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  width: min(90vw, 420px);
}
.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.footer {
  margin-top: 20px;
  font-size: 0.85rem;
}
.footer a {
  color: #e94560;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(22, 33, 62, 0.85);
  border-radius: 12px;
  z-index: 10;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 2rem; color: #e94560; }
.overlay .btn { flex: none; width: 160px; }
</style>
</head>
<body>

<div class="header">
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
  </div>
</div>

<div class="board" id="board">
  <div class="grid">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <div class="tiles" id="tiles"></div>
  <div class="overlay" id="overlay">
    <h2 id="msg">游戏结束</h2>
    <button class="btn" onclick="init()">再来一局</button>
  </div>
</div>

<div class="btn-row">
  <button class="btn" onclick="init()">新游戏</button>
</div>

<div class="footer">
  <a href="../index.html">← 返回大厅</a>
</div>

<script>
const SIZE = 4;
const tileColors = {
  2:'#537188',4:'#4e7a7d',8:'#e07b39',16:'#e8663c',32:'#e94560',
  64:'#d63031',128:'#f0c929',256:'#f0bf27',512:'#edcb23',1024:'#edc53f',2048:'#edc22e'
};

let grid, score, best, moving;

function init() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  moving = false;
  best = parseInt(localStorage.getItem('best2048') || '0');
  document.getElementById('overlay').classList.remove('show');
  spawn(); spawn();
  render();
}

function spawn() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!grid[r][c]) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r, c];
}

function render(newTiles = [], mergedTiles = []) {
  document.getElementById('score').textContent = score;
  if (score > best) { best = score; localStorage.setItem('best2048', best); }
  document.getElementById('best').textContent = best;

  const container = document.getElementById('tiles');
  container.innerHTML = '';
  const cellSize = container.clientWidth / SIZE;
  const gap = 8;
  const tileSize = (container.clientWidth - gap * (SIZE - 1)) / SIZE;

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const v = grid[r][c];
      if (!v) continue;
      const el = document.createElement('div');
      el.className = 'tile';
      const isNew = newTiles.some(t => t[0] === r && t[1] === c);
      const isMerged = mergedTiles.some(t => t[0] === r && t[1] === c);
      if (isNew) el.classList.add('new');
      if (isMerged) el.classList.add('merged');

      el.style.width = tileSize + 'px';
      el.style.height = tileSize + 'px';
      el.style.left = c * (tileSize + gap) + 'px';
      el.style.top = r * (tileSize + gap) + 'px';
      el.style.background = tileColors[v] || '#3d3426';
      el.style.color = v <= 4 ? '#ccc' : '#fff';
      el.style.fontSize = v >= 1024 ? '1.4rem' : v >= 128 ? '1.6rem' : '1.9rem';
      el.textContent = v;
      container.appendChild(el);
    }
  }
}

function move(dir) {
  if (moving) return;
  moving = true;

  const old = grid.map(r => [...r]);
  const merged = [];

  function slide(line) {
    let arr = line.filter(v => v);
    const res = [];
    const m = [];
    for (let i = 0; i < arr.length; i++) {
      if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
        const val = arr[i] * 2;
        res.push(val);
        m.push(res.length - 1);
        score += val;
        i++;
      } else {
        res.push(arr[i]);
      }
    }
    while (res.length < SIZE) res.push(0);
    return { res, m };
  }

  for (let i = 0; i < SIZE; i++) {
    let line, setCell, getPos;
    if (dir === 'left') {
      line = grid[i].slice();
      setCell = (j, v) => grid[i][j] = v;
      getPos = (j) => [i, j];
    } else if (dir === 'right') {
      line = grid[i].slice().reverse();
      setCell = (j, v) => grid[i][SIZE - 1 - j] = v;
      getPos = (j) => [i, SIZE - 1 - j];
    } else if (dir === 'up') {
      line = grid.map(r => r[i]);
      setCell = (j, v) => grid[j][i] = v;
      getPos = (j) => [j, i];
    } else {
      line = grid.map(r => r[i]).reverse();
      setCell = (j, v) => grid[SIZE - 1 - j][i] = v;
      getPos = (j) => [SIZE - 1 - j, i];
    }
    const { res, m } = slide(line);
    res.forEach((v, j) => setCell(j, v));
    m.forEach(j => merged.push(getPos(j)));
  }

  const changed = grid.some((r, i) => r.some((v, j) => v !== old[i][j]));
  if (changed) {
    const sp = spawn();
    render(sp ? [sp] : [], merged);
    setTimeout(() => {
      moving = false;
      if (isGameOver()) {
        document.getElementById('msg').textContent = '游戏结束';
        document.getElementById('overlay').classList.add('show');
      }
      if (grid.some(r => r.some(v => v === 2048)) && !window._won) {
        window._won = true;
        document.getElementById('msg').textContent = '你赢了!';
        document.getElementById('overlay').classList.add('show');
      }
    }, 150);
  } else {
    moving = false;
  }
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return false;
      if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return false;
      if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return false;
    }
  return true;
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Touch
let tx, ty;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) < 30) return;
  if (ax > ay) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

// Resize
window.addEventListener('resize', () => render());

init();
</script>
</body>
</html>
