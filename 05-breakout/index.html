<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打砖块</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 0;
  overflow: hidden;
  touch-action: none;
}
h1 { font-size: 2rem; font-weight: 800; color: #e94560; margin-bottom: 10px; }
.info {
  display: flex;
  gap: 14px;
  margin-bottom: 12px;
}
.stat {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 16px;
  text-align: center;
  min-width: 68px;
}
.stat .label { font-size: 0.65rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
.stat .value { font-size: 1.2rem; font-weight: 700; }
.wrap { position: relative; }
canvas { display: block; border-radius: 10px; cursor: pointer; }
.overlay {
  position: absolute; inset: 0;
  background: rgba(13,27,54,0.88);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border-radius: 10px;
  z-index: 5;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 1.8rem; color: #e94560; }
.overlay p { font-size: 1rem; color: #bbb; }
.btn {
  padding: 10px 28px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
}
.btn:hover { background: #c73652; }
.footer { margin-top: 16px; font-size: 0.85rem; }
.footer a { color: #e94560; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>打砖块</h1>
<div class="info">
  <div class="stat"><div class="label">分数</div><div class="value" id="score">0</div></div>
  <div class="stat"><div class="label">关卡</div><div class="value" id="level">1</div></div>
  <div class="stat"><div class="label">生命</div><div class="value" id="lives">3</div></div>
  <div class="stat"><div class="label">最高</div><div class="value" id="best">0</div></div>
</div>

<div class="wrap">
  <canvas id="canvas"></canvas>
  <div class="overlay show" id="overlay">
    <h2 id="msg">打砖块</h2>
    <p id="sub">点击开始游戏</p>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>
</div>

<div class="footer"><a href="../index.html">← 返回大厅</a></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
// Brick config
const BRICK_ROWS = 6;
const BRICK_COLS = 10;
const BRICK_PAD = 4;
const ROW_COLORS = ['#ef4444','#f97316','#f0c929','#10b981','#3b82f6','#a855f7'];

// Game objects
let paddle, ball, bricks, score, lives, level, best, state, particles;
// state: 'idle' | 'launch' | 'play' | 'over' | 'win'

function resize() {
  const maxW = Math.min(window.innerWidth - 20, 480);
  const maxH = window.innerHeight - 200;
  W = Math.min(maxW, maxH * 0.72);
  W = Math.max(W, 280);
  H = Math.round(W / 0.72);
  canvas.width = W;
  canvas.height = H;
  if (paddle) paddle.w = W * 0.18;
  draw();
}

function initLevel() {
  const brickW = (W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
  const brickH = H * 0.028;
  const topOff = H * 0.08;
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_PAD + c * (brickW + BRICK_PAD),
        y: topOff + r * (brickH + BRICK_PAD),
        w: brickW,
        h: brickH,
        color: ROW_COLORS[r % ROW_COLORS.length],
        hp: level >= 3 && r < 2 ? 2 : 1, // top rows tougher on level 3+
        alive: true
      });
    }
  }
}

function newGame() {
  score = 0;
  lives = 3;
  level = 1;
  particles = [];
  best = parseInt(localStorage.getItem('bestBreakout') || '0');
  initLevel();
  resetBall();
  state = 'launch';
  document.getElementById('overlay').classList.remove('show');
  updateUI();
}

function resetBall() {
  const pw = W * 0.18;
  paddle = { x: (W - pw) / 2, w: pw, h: H * 0.02 };
  paddle.y = H - paddle.h - H * 0.05;
  const speed = (3.5 + level * 0.4) * (H / 640);
  ball = {
    x: W / 2,
    y: paddle.y - 8,
    r: Math.max(5, H * 0.012),
    vx: speed * (Math.random() > 0.5 ? 1 : -1) * 0.7,
    vy: -speed,
    speed
  };
}

function nextLevel() {
  level++;
  initLevel();
  resetBall();
  state = 'launch';
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = lives;
  if (score > best) { best = score; localStorage.setItem('bestBreakout', best); }
  document.getElementById('best').textContent = best;
}

// === Physics ===
function update() {
  if (state === 'launch') {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    return;
  }
  if (state !== 'play') return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Bottom - lose life
  if (ball.y + ball.r > H) {
    lives--;
    updateUI();
    if (lives <= 0) {
      state = 'over';
      document.getElementById('msg').textContent = '游戏结束';
      document.getElementById('sub').textContent = `得分: ${score}　最高: ${best}`;
      document.getElementById('startBtn').textContent = '再来一局';
      document.getElementById('overlay').classList.add('show');
    } else {
      resetBall();
      state = 'launch';
    }
    return;
  }

  // Paddle collision
  if (ball.vy > 0 &&
      ball.y + ball.r >= paddle.y &&
      ball.y + ball.r <= paddle.y + paddle.h + ball.vy + 2 &&
      ball.x >= paddle.x - ball.r &&
      ball.x <= paddle.x + paddle.w + ball.r) {
    ball.y = paddle.y - ball.r;
    // Angle based on hit position
    const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const angle = hit * Math.PI * 0.35; // max ±63°
    const spd = ball.speed * (1 + level * 0.02);
    ball.vx = spd * Math.sin(angle);
    ball.vy = -spd * Math.cos(angle);
  }

  // Brick collision
  let allDead = true;
  for (const b of bricks) {
    if (!b.alive) continue;
    allDead = false;
    if (ballHitRect(b)) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        score += 10 * level;
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);
      } else {
        // Darken color for damaged brick
        b.color = darken(b.color, 0.5);
      }
      updateUI();
      break; // one brick per frame
    }
  }

  // Check win
  if (bricks.every(b => !b.alive)) {
    state = 'win';
    document.getElementById('msg').textContent = `第 ${level} 关通过!`;
    document.getElementById('sub').textContent = `得分: ${score}`;
    document.getElementById('startBtn').textContent = '下一关';
    document.getElementById('overlay').classList.add('show');
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function ballHitRect(b) {
  // Find closest point on rect to ball
  const cx = Math.max(b.x, Math.min(ball.x, b.x + b.w));
  const cy = Math.max(b.y, Math.min(ball.y, b.y + b.h));
  const dx = ball.x - cx, dy = ball.y - cy;
  if (dx * dx + dy * dy > ball.r * ball.r) return false;

  // Determine bounce direction
  const overlapL = ball.x + ball.r - b.x;
  const overlapR = b.x + b.w - (ball.x - ball.r);
  const overlapT = ball.y + ball.r - b.y;
  const overlapB = b.y + b.h - (ball.y - ball.r);
  const minX = Math.min(overlapL, overlapR);
  const minY = Math.min(overlapT, overlapB);

  if (minX < minY) {
    ball.vx = -ball.vx;
    ball.x += ball.vx > 0 ? 2 : -2;
  } else {
    ball.vy = -ball.vy;
    ball.y += ball.vy > 0 ? 2 : -2;
  }
  return true;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1, color, life: 1 });
  }
}

function darken(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
}

// === Drawing ===
function draw() {
  ctx.fillStyle = '#0d1b36';
  ctx.fillRect(0, 0, W, H);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x + 2, b.y + 1, b.w - 4, 2);
  }

  // Paddle
  const pg = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pg.addColorStop(0, '#e94560');
  pg.addColorStop(1, '#b8344d');
  ctx.fillStyle = pg;
  roundRect(paddle.x, paddle.y, paddle.w, paddle.h, paddle.h / 2);
  ctx.fill();

  // Ball
  if (ball) {
    // Glow
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(ball.x - ball.r * 0.25, ball.y - ball.r * 0.25, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// === Input ===
let keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'ArrowUp') && state === 'launch') {
    e.preventDefault();
    state = 'play';
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

// Mouse
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  paddle.x = mx - paddle.w / 2;
  clampPaddle();
});

canvas.addEventListener('click', () => {
  if (state === 'launch') state = 'play';
});

// Touch
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.touches[0].clientX - rect.left) * (W / rect.width);
  paddle.x = mx - paddle.w / 2;
  clampPaddle();
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'launch') state = 'play';
  const rect = canvas.getBoundingClientRect();
  const mx = (e.touches[0].clientX - rect.left) * (W / rect.width);
  paddle.x = mx - paddle.w / 2;
  clampPaddle();
}, { passive: false });

function clampPaddle() {
  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
}

document.getElementById('startBtn').addEventListener('click', () => {
  if (state === 'win') { nextLevel(); }
  else { newGame(); }
  document.getElementById('overlay').classList.remove('show');
});

// === Loop ===
function loop() {
  // Keyboard paddle movement
  const spd = W * 0.012;
  if (keys['ArrowLeft'] || keys['a']) { paddle.x -= spd; clampPaddle(); }
  if (keys['ArrowRight'] || keys['d']) { paddle.x += spd; clampPaddle(); }

  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
newGame();
state = 'idle';
document.getElementById('overlay').classList.add('show');
document.getElementById('msg').textContent = '打砖块';
document.getElementById('sub').textContent = '点击开始 / 鼠标移动挡板';
document.getElementById('startBtn').textContent = '开始游戏';
best = parseInt(localStorage.getItem('bestBreakout') || '0');
document.getElementById('best').textContent = best;
requestAnimationFrame(loop);
</script>
</body>
</html>
